# Privilege Vault AI — Local Development
version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: privilege_vault_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pv-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/privilege_vault_ai
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?required}
      AUTH_SECRET: ${AUTH_SECRET:?required}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_PATH: /app/storage
    volumes:
      - app-storage:/app/storage
    ports:
      - "3000:3000"

  # Optional: Ollama for local AI inference
  # Uncomment if you want Ollama containerized
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: pv-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  postgres-data:
  app-storage:
  # ollama-models:
