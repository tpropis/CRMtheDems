# Privilege Vault AI — Production (private VPC / on-prem)
version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: privilege_vault_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    # No external port exposure in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/privilege_vault_ai
      NEXTAUTH_URL: ${NEXTAUTH_URL:?required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?required}
      AUTH_SECRET: ${AUTH_SECRET:?required}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:70b}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?required}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    volumes:
      - app-storage:/app/storage
    networks:
      - internal
      - external
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pv-app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.pv-app.tls=true"
      - "traefik.http.routers.pv-app.tls.certresolver=letsencrypt"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl-certs:/etc/ssl/certs
    networks:
      - external
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres-data:
  app-storage:
  ssl-certs:
